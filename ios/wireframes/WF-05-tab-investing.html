<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-primitives.jsx"></script>
<script type="text/babel" src="screens-03-core.jsx"></script>
<script type="text/babel">
const PHONE_W = 290;
const PHONE_H = 600;
function Frame({ children, notes }) {
  return (
    <div style={{ position: 'relative', width: PHONE_W, height: PHONE_H }}>
      <WPhone w={PHONE_W} h={PHONE_H}>{children}</WPhone>
      {notes}
    </div>
  );
}
function App() {
  return (
    <DesignCanvas title="05 모의 투자">
      
      <DCSection id="investing" title="⑤ 모의 투자" subtitle="실전 전 연습 — 사주 기반 추천이 차별점">
        <DCArtboard id="mock" label="모의투자 홈" width={PHONE_W} height={PHONE_H}><Frame notes={<WNote side="left" style={{top:220,left:PHONE_W+16,width:180}}>"왜?" 탭하면 사주 근거 모달 — 교육적 효과</WNote>}><ScrMockInvest /></Frame></DCArtboard>
        <DCArtboard id="buy" label="매수 주문" width={PHONE_W} height={PHONE_H}><Frame notes={<WNote side="left" style={{top:80,left:PHONE_W+16,width:170}}>상단에 오늘의 기운 힌트 — 충동 매매 억제 장치</WNote>}><ScrBuyOrder /></Frame></DCArtboard>
        <DCArtboard id="portfolio" label="포트폴리오 분석" width={PHONE_W} height={PHONE_H}><Frame><ScrPortfolio /></Frame></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
