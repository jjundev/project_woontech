ios_root: ../ios
worktrees_dir: ../worktrees

# Build uses generic/platform=iOS Simulator so any installed simulator works.
# Tests require a concrete device; override `name=…` if iPhone 17 Pro is not
# installed (verify with `xcrun simctl list devices available`).
build_cmd: "xcodebuild -quiet -scheme Woontech -destination 'generic/platform=iOS Simulator' build"
unit_test_cmd: "xcodebuild -quiet test -scheme Woontech -destination 'platform=iOS Simulator,name=iPhone 17 Pro' {only_testing:WoontechTests}"
ui_test_cmd: "xcodebuild -quiet test -scheme Woontech -destination 'platform=iOS Simulator,name=iPhone 17 Pro' {only_testing:WoontechUITests}"

default_max_plan_retries: 3
default_max_impl_retries: 3

# github_repo: "your-org/your-repo"  # set to enable gh pr create

main_branch: main
host: 127.0.0.1
port: 8765

# Per-agent model override. null (or missing) = SDK default (Opus).
# Smaller models on low-complexity roles reduce cost without hurting output quality.
agents:
  planner:            { model: null }
  plan-reviewer:      { model: null }
  implementor:        { model: null }
  implement-reviewer: { model: null }
  publisher:          { model: claude-haiku-4-5-20251001 }
