name: Woontech
options:
  bundleIdPrefix: com.woontech
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Woontech:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Woontech
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Woontech/Resources/Assets.xcassets
      - path: Woontech/Resources/ko.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woontech.app
        INFOPLIST_FILE: Woontech/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: ko

  WoontechTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WoontechTests
    dependencies:
      - target: Woontech
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woontech.app.tests
        GENERATE_INFOPLIST_FILE: YES

  WoontechUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WoontechUITests
    dependencies:
      - target: Woontech
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woontech.app.uitests
        TEST_TARGET_NAME: Woontech
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Woontech:
    build:
      targets:
        Woontech: all
        WoontechTests: [test]
        WoontechUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WoontechTests
        - WoontechUITests
