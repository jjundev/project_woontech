ios_root: ../ios
worktrees_dir: ../worktrees

# Route iOS build/test execution through the wrapper so simulator selection,
# isolated DerivedData, and Xcode/LLDB launch-infra repair are consistent.
build_cmd: "python3 tools/xcode_test_runner.py build"
unit_test_cmd: "python3 tools/xcode_test_runner.py test --target WoontechTests {only_testing:WoontechTests}"
ui_test_cmd: "python3 tools/xcode_test_runner.py test --target WoontechUITests --ui {only_testing:WoontechUITests}"

default_max_plan_retries: 3
default_max_impl_retries: 3

github_repo: "jjundev/project_woontech"
main_branch: main
host: 127.0.0.1
port: 8765

# Per-agent model override. null (or missing) = SDK default (Opus).
# Smaller models on low-complexity roles reduce cost without hurting output quality.
agents:
  planner:            { model: null }
  plan-reviewer:      { model: null }
  implementor:        { model: null }
  implement-reviewer: { model: null }
  publisher:          { model: claude-haiku-4-5-20251001 }
